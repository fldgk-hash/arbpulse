<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f593"/>
      <stop offset="50%" style="stop-color:#4d9fff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect width="1200" height="3" fill="url(#accent)" y="0"/>
  <!-- Grid lines decoration -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="rgba(100,150,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="rgba(100,150,255,0.06)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="rgba(100,150,255,0.04)" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="rgba(100,150,255,0.04)" stroke-width="1"/>
  <!-- Logo mark -->
  <polygon points="110,280 160,255 210,280 210,330 160,355 110,330" fill="#00f593" opacity="0.9"/>
  <text x="160" y="325" font-family="monospace" font-size="42" font-weight="bold" fill="#000" text-anchor="middle">A</text>
  <!-- Brand name -->
  <text x="250" y="315" font-family="sans-serif" font-size="72" font-weight="700" fill="#dce8ff" letter-spacing="-1">ArbPulse</text>
  <rect x="640" y="270" width="90" height="32" rx="6" fill="rgba(167,139,250,0.15)"/>
  <rect x="640" y="270" width="90" height="32" rx="6" fill="none" stroke="#a78bfa" stroke-width="1"/>
  <text x="685" y="292" font-family="sans-serif" font-size="16" font-weight="700" fill="#a78bfa" text-anchor="middle">PRO</text>
  <!-- Tagline -->
  <text x="110" y="380" font-family="monospace" font-size="24" fill="rgba(176,190,197,0.7)">Real-time Solana + BSC DEX · CEX Arbitrage Scanner</text>
  <!-- Feature pills -->
  <g transform="translate(110, 430)">
    <rect width="130" height="28" rx="14" fill="rgba(0,245,147,0.08)" stroke="rgba(0,245,147,0.3)" stroke-width="1"/>
    <text x="65" y="19" font-family="sans-serif" font-size="13" font-weight="600" fill="#00f593" text-anchor="middle">◎ Solana DEX</text>
  </g>
  <g transform="translate(255, 430)">
    <rect width="130" height="28" rx="14" fill="rgba(255,185,48,0.08)" stroke="rgba(255,185,48,0.3)" stroke-width="1"/>
    <text x="65" y="19" font-family="sans-serif" font-size="13" font-weight="600" fill="#ffc94d" text-anchor="middle">🟡 BNB Chain</text>
  </g>
  <g transform="translate(400, 430)">
    <rect width="130" height="28" rx="14" fill="rgba(77,159,255,0.08)" stroke="rgba(77,159,255,0.3)" stroke-width="1"/>
    <text x="65" y="19" font-family="sans-serif" font-size="13" font-weight="600" fill="#4d9fff" text-anchor="middle">📊 4 CEX Live</text>
  </g>
  <g transform="translate(545, 430)">
    <rect width="160" height="28" rx="14" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="80" y="19" font-family="sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">🔒 RugCheck Safety</text>
  </g>
  <!-- URL -->
  <text x="1090" y="610" font-family="monospace" font-size="18" fill="rgba(100,150,255,0.4)" text-anchor="end">arbpulse.pro</text>
</svg>